version: "3.9"

services:
  wsserver:
    build: .
    container_name: go-ws-server
    ports:
      - "5002:5002"
    environment:
      ADDR: ":5002"
      LOG_LEVEL: "info"
      SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT"
      PRODUCER_INTERVAL: "2s"
      CLIENT_RATE_LIMIT: "20"
      WS_SEND_BUFFER: "64"
    restart: unless-stopped
